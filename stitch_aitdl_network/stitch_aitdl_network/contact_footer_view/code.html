<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contact - AITDL Network</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Outfit:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0de3f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102122",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Outfit", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .emerald-glow {
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }
        .emerald-glow:hover {
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }
        .primary-glow {
            box-shadow: 0 0 20px rgba(13, 227, 242, 0.3);
        }
        .primary-glow:hover {
            box-shadow: 0 0 30px rgba(13, 227, 242, 0.5);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col relative overflow-x-hidden antialiased">
<!-- Ambient Space Glows -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-0 right-1/4 w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-0 left-1/4 w-[500px] h-[500px] bg-[#00FF9D]/5 rounded-full blur-[100px]"></div>
</div>
<!-- Minimal Back Header (Focused View) -->
<header class="w-full px-6 py-4 flex items-center z-10 relative">
<button class="flex items-center gap-2 text-slate-400 hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-xl group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="text-sm font-medium tracking-wide">Return to Main</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-[1200px] mx-auto px-6 py-12 flex flex-col justify-center z-10 relative">
<div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
<!-- Left Side: Direct Contact -->
<div class="flex flex-col gap-10">
<div class="space-y-4">
<h1 class="text-4xl md:text-5xl font-bold tracking-tight text-white">
                        Initiate<br/>Transmission
                    </h1>
<p class="text-slate-400 font-body text-lg max-w-md">
                        Start a conversation about your next enterprise AI integration or custom software architecture.
                    </p>
</div>
<div class="flex flex-col gap-4">
<!-- Email Panel -->
<div class="glass-panel rounded-xl p-6 flex items-center gap-4 transition-all hover:border-primary/50 group">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="envelope">mail_outline</span>
</div>
<div>
<p class="text-xs text-slate-400 uppercase tracking-widest mb-1 font-body">Direct Link</p>
<h2 class="text-white text-lg font-mono font-medium tracking-tight">hello@aitdl.network</h2>
</div>
</div>
<!-- WhatsApp CTA -->
<button class="w-full rounded-xl p-6 flex items-center justify-between bg-[#00FF9D]/10 border border-[#00FF9D]/30 emerald-glow transition-all hover:bg-[#00FF9D]/20 group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-[#00FF9D] flex items-center justify-center text-black">
<span class="material-symbols-outlined" data-icon="whatsapp_logo">home_app_logo</span>
</div>
<div class="text-left">
<h2 class="text-[#00FF9D] text-xl font-bold leading-tight">Chat on WhatsApp</h2>
<p class="text-slate-300 text-sm font-body">Immediate response line</p>
</div>
</div>
<span class="material-symbols-outlined text-[#00FF9D] group-hover:translate-x-2 transition-transform">arrow_forward</span>
</button>
</div>
</div>
<!-- Right Side: Terminal Form -->
<div class="glass-panel rounded-2xl p-8 lg:p-10">
<form class="flex flex-col gap-8">
<div class="relative group">
<input class="peer w-full bg-transparent border-0 border-b border-slate-600 px-0 py-3 text-white font-body focus:ring-0 focus:border-primary placeholder-transparent transition-colors" id="name" placeholder="Name" required="" type="text"/>
<label class="absolute left-0 top-3 text-slate-400 font-body transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary cursor-text" for="name">Identifier (Name)</label>
</div>
<div class="relative group">
<input class="peer w-full bg-transparent border-0 border-b border-slate-600 px-0 py-3 text-white font-body focus:ring-0 focus:border-primary placeholder-transparent transition-colors" id="email" placeholder="Email" required="" type="email"/>
<label class="absolute left-0 top-3 text-slate-400 font-body transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-4 peer-focus:text-xs peer-focus:text-primary cursor-text" for="email">Comlink (Email)</label>
</div>
<div class="relative group mt-2">
<textarea class="peer w-full bg-transparent border-0 border-b border-slate-600 px-0 py-3 text-white font-body focus:ring-0 focus:border-primary placeholder-transparent transition-colors resize-none" id="project" placeholder="Project Details" required="" rows="4"></textarea>
<label class="absolute left-0 top-3 text-slate-400 font-body transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-5 peer-focus:text-xs peer-focus:text-primary cursor-text" for="project">Project Parameters</label>
</div>
<button class="mt-4 w-full bg-primary text-black font-bold py-4 rounded-lg tracking-wide uppercase text-sm primary-glow hover:bg-primary/90 flex items-center justify-center gap-2 transition-all" type="button">
<span>Initialize Sequence</span>
<span class="material-symbols-outlined text-lg">send</span>
</button>
</form>
</div>
</div>
</main>
<!-- Footer -->
<footer class="h-[80px] w-full border-t border-white/10 mt-auto z-10 relative flex items-center justify-center px-6 glass-panel border-b-0 border-l-0 border-r-0 rounded-none shadow-none bg-opacity-30">
<div class="w-full max-w-[1200px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-xs font-body text-slate-500">
<div class="font-display font-bold text-slate-400 tracking-wider">AITDL NETWORK</div>
<div class="text-center">Designed &amp; Architected by Jawahar R Mallah</div>
<div class="flex items-center gap-4">
<a aria-label="X (Twitter)" class="hover:text-primary transition-colors flex items-center" href="#">
<span class="material-symbols-outlined text-[20px]">close</span>
</a>
<a aria-label="LinkedIn" class="hover:text-primary transition-colors flex items-center" href="#">
<span class="material-symbols-outlined text-[20px]">work</span>
</a>
<a aria-label="GitHub" class="hover:text-primary transition-colors flex items-center" href="#">
<span class="material-symbols-outlined text-[20px]">code</span>
</a>
</div>
</div>
</footer>
</body></html>
