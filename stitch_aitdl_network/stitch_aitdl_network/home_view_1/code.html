<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0de3f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#070B14",
                        "surface-dark": "rgba(17, 24, 39, 0.6)",
                        "text-primary": "#F8FAFC",
                        "text-muted": "#8A96AA",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Outfit", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'hero-glow': 'radial-gradient(circle at 50% 0%, rgba(13, 227, 242, 0.15) 0%, transparent 60%)',
                    }
                },
            },
        }
    </script>
<style>
        /* Base styles */
        body {
            background-color: theme('colors.background-dark');
            color: theme('colors.text-primary');
            font-family: theme('fontFamily.body');
            margin: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism Utilities */
        .glass-nav {
            background-color: theme('colors.surface-dark');
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: theme('fontFamily.display');
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .animate-slide-up {
            opacity: 0;
            animation: slideUp 0.8s ease-out 0.2s forwards;
        }

        /* Text Gradient */
        .text-gradient {
            background: linear-gradient(180deg, #F8FAFC 0%, #8A96AA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Button Hover Effects */
        .btn-primary {
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(13, 227, 242, 0.15);
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 32px rgba(13, 227, 242, 0.3);
        }

        .btn-secondary {
            transition: all 0.3s ease;
            border: 1px solid theme('colors.text-muted');
            color: theme('colors.text-primary');
        }

        .btn-secondary:hover {
            border-color: theme('colors.primary');
            color: theme('colors.primary');
        }

        /* Responsive Background Glow */
        @media (max-width: 768px) {
            .bg-hero-glow {
                background-image: none !important;
            }
        }
    </style>
</head>
<body class="antialiased min-h-screen relative">
